{% extends "admin/base_site.html" %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <p>
        Schedule ID<br>
        <input type="text" name="schedule_id" required>
    </p>
    <p>
        批量替换（每行一条，格式：2025年4月15日 19:30 新卡司表）<br>
        <textarea name="replace_lines" rows="15" style="width:100%;" required></textarea>
    </p>
    <button type="submit">执行</button>
</form>
{% if result %}
<h2>Result</h2>
<pre>{{ result }}</pre>
{% endif %}
{% endblock %}
